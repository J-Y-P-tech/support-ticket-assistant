# Docker Compose — text-pipeline stack (plan Task 7; kb_mcp added for Checkpoint C).
# postgres + four app services (email_mcp, kb_mcp, api, frontend). email_mcp/api/
# frontend carry the no-AI path (submit -> store -> rep queue -> lookup); kb_mcp is
# the Knowledge-Base connector the AI pipeline's retrieve step calls (SPEC §4.4).
# langfuse (Task 31) is the self-hosted observability service with its own Postgres
# datastore — no ticket data leaves the machine (SPEC §7.2). Ollama is NOT containerized;
# services reach it on the host via host.docker.internal (Linux needs the host-gateway
# mapping per service).
#
# All app services build from the repo root (context: .) because their Dockerfiles
# COPY `pyproject.toml`/`uv.lock` and their `services/<name>` tree from there. They
# read tokens/URLs from `.env` (env_file); values there already use the compose
# service names (api, email_mcp) as hostnames.

services:
  postgres:
    image: postgres:latest # "always newest" per project decision
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PG18+ stores data in a subdirectory and expects the volume at
      # /var/lib/postgresql (not the old .../data). Mounting the old path makes the
      # image refuse to start ("data in unused mount/volume").
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  email_mcp:
    build:
      context: .
      dockerfile: services/email_mcp/Dockerfile
    restart: unless-stopped
    # The sole DB owner (SPEC §6): reads POSTGRES_* from .env, but overrides the
    # host — .env defaults POSTGRES_HOST to localhost for host-run `make migrate`;
    # in-cluster it must reach the `postgres` service by name.
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    # Exposed on the host so the opt-in live integration test (RUN_LIVE_MCP=1) can
    # reach the MCP endpoint at http://localhost:8000/mcp.
    ports:
      - "${EMAIL_MCP_PORT:-8000}:8000"

  kb_mcp:
    build:
      context: .
      dockerfile: services/kb_mcp/Dockerfile
    restart: unless-stopped
    # The Knowledge-Base connector (SPEC §4.4): no DB, no secrets to protect — the
    # curated mock_kb answers ship in the image. Reads KB_SEARCH_LIMIT from .env so it
    # matches the api's value. Not published on the host; the api reaches it in-cluster
    # at http://kb_mcp:8000/mcp (KB_MCP_URL in .env).
    env_file: .env

  # Self-hosted Langfuse (SPEC §7.2): one PII-redacted trace per ticket, scores, and
  # versioned prompts — all on-box, no ticket data leaving the machine. Pinned to v2,
  # whose self-host needs only its own Postgres (langfuse-db), unlike v3's ClickHouse/
  # Redis/object-store sidecars. LANGFUSE_INIT_* provisions a project whose keys equal
  # the LANGFUSE_PUBLIC_KEY/SECRET_KEY the api reads from .env, so a fresh stack traces
  # out of the box. Reachable in-cluster at http://langfuse:3000 (LANGFUSE_HOST in .env).
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      NEXTAUTH_URL: ${LANGFUSE_HOST}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: support-ticket-assistant
      LANGFUSE_INIT_PROJECT_ID: support-ticket-assistant
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    # All api Settings come from .env (LLM tag, tokens, MCP URLs, keys). Values
    # there already point at the in-cluster service names (EMAIL_MCP_URL=...email_mcp...).
    env_file: .env
    # Reach the host's Ollama via host.docker.internal (used from Task 10 on; wired
    # now so the LLM path needs no compose change). Linux requires host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      email_mcp:
        condition: service_started
      kb_mcp:
        condition: service_started
      langfuse:
        condition: service_started
    ports:
      - "${API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    restart: unless-stopped
    # The frontend only needs API_BASE_URL + API_AUTH_TOKEN (both in .env); it holds
    # no DB or MCP credentials.
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8501}:8501"

volumes:
  pgdata:
  langfuse_pgdata:
