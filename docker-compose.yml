# Docker Compose skeleton — postgres only (plan Task 1).
# App services (api, kb_mcp, email_mcp, frontend) and langfuse are wired in later
# tasks. Ollama is NOT containerized; services reach it via host.docker.internal.

services:
  postgres:
    image: postgres:latest # "always newest" per project decision
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
